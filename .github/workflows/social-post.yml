name: Auto-Post to Social Media

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  # 啞巴 job — 確保起碼有一個 job 執行，workflow 才不會因「0 jobs」被標為失敗
  dummy:
    runs-on: ubuntu-latest
    steps:
      - name: Check social tokens
        run: |
          if [ -z "${{ secrets.TWITTER_BEARER_TOKEN }}" ]; then
            echo "TWITTER_BEARER_TOKEN not configured — skipping Twitter post"
          else
            echo "Twitter token present — will post"
          fi
          if [ -z "${{ secrets.FB_PAGE_ACCESS_TOKEN }}" ]; then
            echo "FB_PAGE_ACCESS_TOKEN not configured — skipping Facebook post"
          else
            echo "Facebook token present — will post"
          fi

  post-twitter:
    runs-on: ubuntu-latest
    if: secrets.TWITTER_BEARER_TOKEN != ''
    steps:
      - name: Post to Twitter/X
        run: |
          curl -s -X POST "https://api.twitter.com/2/tweets" \
            -H "Authorization: Bearer ${{ secrets.TWITTER_BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"🌏 世界頭條 每日即時資訊更新\n\n涵蓋 BBC·CNN·Reuters·NPR·Bloomberg\n\n📰 https://world-news.xyz\n\n#世界頭條 #即時新聞 #BBC"}'
        continue-on-error: true

  post-facebook:
    runs-on: ubuntu-latest
    if: secrets.FB_PAGE_ACCESS_TOKEN != ''
    steps:
      - name: Post to Facebook Page
        run: |
          curl -s -X POST \
            "https://graph.facebook.com/v18.0/me/feed" \
            -d "link=https://world-news.xyz" \
            -d "message=🌏 世界頭條 — 每日即時全球資訊更新" \
            -d "access_token=${{ secrets.FB_PAGE_ACCESS_TOKEN }}"
        continue-on-error: true
